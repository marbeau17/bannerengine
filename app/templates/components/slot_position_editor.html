{% set cv = current_value if current_value is mapping else {} %}
<details class="border-t border-gray-100 pt-2 mt-1">
  <summary class="text-[11px] font-medium text-gray-500 cursor-pointer hover:text-gray-700">位置・サイズ</summary>
  <div class="mt-2 grid grid-cols-2 gap-2">
    <div class="flex items-center gap-1">
      <label class="text-[10px] text-gray-400 w-6">X</label>
      <input
        type="number"
        name="x"
        value="{{ cv.get('x', current_slot.x) }}"
        min="0" max="100" step="0.5"
        class="w-full px-2 py-1 text-xs border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500"
        hx-patch="/api/slots/{{ pattern_id }}/{{ current_slot.id }}"
        hx-target="#preview-canvas"
        hx-swap="outerHTML"
        hx-trigger="input changed delay:500ms"
        hx-sync="body:queue"
        hx-vals='{"slot_type": "{{ current_slot.type.value }}"}'
      >
      <span class="text-[10px] text-gray-400">%</span>
    </div>
    <div class="flex items-center gap-1">
      <label class="text-[10px] text-gray-400 w-6">Y</label>
      <input
        type="number"
        name="y"
        value="{{ cv.get('y', current_slot.y) }}"
        min="0" max="100" step="0.5"
        class="w-full px-2 py-1 text-xs border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500"
        hx-patch="/api/slots/{{ pattern_id }}/{{ current_slot.id }}"
        hx-target="#preview-canvas"
        hx-swap="outerHTML"
        hx-trigger="input changed delay:500ms"
        hx-sync="body:queue"
        hx-vals='{"slot_type": "{{ current_slot.type.value }}"}'
      >
      <span class="text-[10px] text-gray-400">%</span>
    </div>
    <div class="flex items-center gap-1">
      <label class="text-[10px] text-gray-400 w-6">W</label>
      <input
        type="number"
        name="width"
        value="{{ cv.get('width', current_slot.width) }}"
        min="1" max="100" step="0.5"
        class="w-full px-2 py-1 text-xs border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500"
        hx-patch="/api/slots/{{ pattern_id }}/{{ current_slot.id }}"
        hx-target="#preview-canvas"
        hx-swap="outerHTML"
        hx-trigger="input changed delay:500ms"
        hx-sync="body:queue"
        hx-vals='{"slot_type": "{{ current_slot.type.value }}"}'
      >
      <span class="text-[10px] text-gray-400">%</span>
    </div>
    <div class="flex items-center gap-1">
      <label class="text-[10px] text-gray-400 w-6">H</label>
      <input
        type="number"
        name="height"
        value="{{ cv.get('height', current_slot.height) }}"
        min="1" max="100" step="0.5"
        class="w-full px-2 py-1 text-xs border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500"
        hx-patch="/api/slots/{{ pattern_id }}/{{ current_slot.id }}"
        hx-target="#preview-canvas"
        hx-swap="outerHTML"
        hx-trigger="input changed delay:500ms"
        hx-sync="body:queue"
        hx-vals='{"slot_type": "{{ current_slot.type.value }}"}'
      >
      <span class="text-[10px] text-gray-400">%</span>
    </div>
  </div>
</details>
