<div class="space-y-3">
  <!-- Toggle switch -->
  <div class="flex items-center gap-3">
    <span class="text-xs text-gray-500 {{ 'font-semibold text-gray-700' if not current_value.get('mode', 'text') == 'image' else '' }}">テキスト</span>
    <label class="relative inline-flex items-center cursor-pointer">
      <input
        type="checkbox"
        id="mode-toggle-{{ current_slot.id }}"
        class="sr-only peer"
        {{ 'checked' if current_value.get('mode') == 'image' else '' }}
        onchange="toggleSlotMode('{{ current_slot.id }}', this.checked)"
      >
      <div class="w-9 h-5 bg-gray-300 peer-focus:ring-2 peer-focus:ring-indigo-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
    </label>
    <span class="text-xs text-gray-500 {{ 'font-semibold text-gray-700' if current_value.get('mode') == 'image' else '' }}">画像</span>
  </div>

  <!-- Text editor (shown when mode is text) -->
  <div id="text-editor-{{ current_slot.id }}" class="{{ 'hidden' if current_value.get('mode') == 'image' else '' }}">
    <textarea
      name="content"
      rows="2"
      placeholder="テキストを入力..."
      maxlength="{{ current_slot.max_chars or '' }}"
      class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-y transition"
      hx-patch="/api/templates/{{ pattern_id }}/slots/{{ current_slot.id }}"
      hx-target="#preview-canvas"
      hx-trigger="input changed delay:300ms"
      hx-vals='{"slot_type": "text", "mode": "text"}'
    >{{ current_value.get('content', '') }}</textarea>

    {% if current_slot.max_chars %}
    <div class="text-[11px] text-gray-400 text-right">
      <span class="char-count">{{ current_value.get('content', '') | length }}</span> / {{ current_slot.max_chars }}
    </div>
    {% endif %}

    {% if current_slot.color %}
    <div class="flex items-center gap-1 mt-1 text-[11px] text-gray-400">
      <span class="inline-block w-3 h-3 rounded-full border border-gray-200" style="background-color: {{ current_slot.color }};"></span>
      {{ current_slot.color }}
    </div>
    {% endif %}
  </div>

  <!-- Image editor (shown when mode is image) -->
  <div id="image-editor-{{ current_slot.id }}" class="{{ '' if current_value.get('mode') == 'image' else 'hidden' }}">
    <div
      class="relative border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-indigo-400 transition-colors cursor-pointer"
      ondragover="event.preventDefault(); this.classList.add('border-indigo-400', 'bg-indigo-50')"
      ondragleave="this.classList.remove('border-indigo-400', 'bg-indigo-50')"
      ondrop="event.preventDefault(); this.classList.remove('border-indigo-400', 'bg-indigo-50'); handleFileDrop(event, '{{ current_slot.id }}')"
      onclick="this.querySelector('input[type=file]').click()"
    >
      {% if current_value.get('source_url') %}
      <img
        src="{{ current_value.get('source_url') }}"
        alt="Uploaded image"
        class="mx-auto max-h-20 rounded mb-2 object-contain"
      >
      <p class="text-xs text-gray-400">クリックで画像を変更</p>
      {% else %}
      <svg class="mx-auto w-8 h-8 text-gray-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <p class="text-xs text-gray-500">画像をアップロード</p>
      {% endif %}

      <form
        id="upload-form-{{ current_slot.id }}"
        hx-post="/api/assets/upload"
        hx-encoding="multipart/form-data"
        hx-target="#preview-canvas"
        class="hidden"
      >
        <input type="hidden" name="slot_id" value="{{ current_slot.id }}">
        <input type="hidden" name="pattern_id" value="{{ pattern_id }}">
        <input type="hidden" name="mode" value="image">
        <input
          type="file"
          name="file"
          accept="image/*"
          onchange="htmx.trigger(this.closest('form'), 'submit')"
        >
      </form>
    </div>
  </div>
</div>

<script>
  function toggleSlotMode(slotId, isImage) {
    var textEditor = document.getElementById('text-editor-' + slotId);
    var imageEditor = document.getElementById('image-editor-' + slotId);
    if (isImage) {
      textEditor.classList.add('hidden');
      imageEditor.classList.remove('hidden');
    } else {
      textEditor.classList.remove('hidden');
      imageEditor.classList.add('hidden');
    }
  }
</script>
