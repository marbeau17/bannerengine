{% if status == 'processing' %}
<div
  class="space-y-2"
  hx-get="/api/generate/progress/{{ job_id }}"
  hx-trigger="every 1s"
  hx-target="#generate-result"
  hx-swap="innerHTML"
>
  <p class="text-xs font-medium text-gray-600">生成中...</p>
  <div class="w-full bg-gray-200 rounded-full h-2">
    <div
      class="bg-indigo-600 h-2 rounded-full transition-all duration-300"
      style="width: {{ progress }}%"
    ></div>
  </div>
  <p class="text-xs text-gray-400 text-right">{{ progress }}%</p>
</div>

{% elif status == 'completed' %}
<div class="space-y-2">
  <div class="flex items-center gap-2 text-green-600">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <p class="text-xs font-medium">生成完了</p>
  </div>
  <div class="w-full bg-gray-200 rounded-full h-2">
    <div class="bg-green-500 h-2 rounded-full w-full"></div>
  </div>
  {% if file_url %}
  <a
    href="{{ file_url }}"
    download
    class="inline-flex items-center gap-1.5 mt-1 px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-semibold rounded-md transition-colors"
  >
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/>
    </svg>
    ダウンロード
  </a>
  {% endif %}
</div>

{% elif status == 'error' %}
<div class="space-y-1">
  <div class="flex items-center gap-2 text-red-600">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <p class="text-xs font-medium">エラーが発生しました</p>
  </div>
  {% if error %}
  <p class="text-xs text-red-400">{{ error }}</p>
  {% endif %}
</div>

{% endif %}
