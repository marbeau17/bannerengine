<div
  id="preview-canvas"
  class="inline-block shadow-lg bg-white transition-transform duration-150"
  style="max-width: 100%; max-height: 100%;"
  data-pattern-id="{{ pattern_id | default('') }}"
>
  {% if svg_content or svg_markup %}
    {{ (svg_content or svg_markup) | safe }}
  {% elif template %}
    <!-- Placeholder canvas matching template dimensions -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 {{ template.meta.width }} {{ template.meta.height }}"
      width="{{ template.meta.width }}"
      height="{{ template.meta.height }}"
      style="max-width: 100%; height: auto;"
      class="border border-dashed border-gray-300"
    >
      <rect width="100%" height="100%" fill="{{ template.design.background_value or '#FFFFFF' }}" />
      {% for slot in template.slots %}
      <rect
        x="{{ slot.x / 100 * template.meta.width }}"
        y="{{ slot.y / 100 * template.meta.height }}"
        width="{{ slot.width / 100 * template.meta.width }}"
        height="{{ slot.height / 100 * template.meta.height }}"
        fill="none"
        stroke="#CBD5E1"
        stroke-width="1"
        stroke-dasharray="4 2"
        rx="2"
      />
      <text
        x="{{ (slot.x + slot.width / 2) / 100 * template.meta.width }}"
        y="{{ (slot.y + slot.height / 2) / 100 * template.meta.height }}"
        text-anchor="middle"
        dominant-baseline="central"
        fill="#94A3B8"
        font-size="10"
        font-family="sans-serif"
      >{{ slot.id }}</text>
      {% endfor %}
    </svg>
  {% else %}
    <div class="flex items-center justify-center w-64 h-40 text-gray-300 text-sm">
      プレビューなし
    </div>
  {% endif %}
</div>
