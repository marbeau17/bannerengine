<ul class="space-y-1">
  <!-- All categories -->
  <li>
    <button
      class="w-full flex items-center justify-between px-3 py-2 text-sm rounded-md hover:bg-indigo-50 text-gray-700 hover:text-indigo-600 font-medium transition-colors"
      hx-get="/api/templates"
      hx-target="#template-grid"
    >
      <span>すべて</span>
      <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">
        {% set total = categories | map(attribute='count') | sum %}
        {{ total }}
      </span>
    </button>
  </li>

  {% for cat in categories %}
  <li>
    <button
      class="w-full flex items-center justify-between px-3 py-2 text-sm rounded-md hover:bg-indigo-50 text-gray-700 hover:text-indigo-600 transition-colors"
      hx-get="/api/templates?category={{ cat.key }}"
      hx-target="#template-grid"
    >
      <span>{{ cat.display_name }}</span>
      <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">{{ cat.count }}</span>
    </button>
  </li>
  {% endfor %}
</ul>
